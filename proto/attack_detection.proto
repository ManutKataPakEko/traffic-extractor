syntax = "proto3";

option go_package = "request-extractor/gen/attackdetection;attackdetectionpb";

service AttackDetection {
  rpc Predict (PredictRequest) returns (PredictResponse);
}

message PredictRequest {
  string timestamp = 1;
  string ip = 2;
  string method = 3;
  string path = 4;
  string query = 5;
  map<string, string> headers = 6;
  string body = 7;
}

message PredictResponse {
  string prediction = 1;
}
